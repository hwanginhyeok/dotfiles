# ╔══════════════════════════════════════════════╗
# ║  Minimal Mono Theme — tmux 3.4              ║
# ╚══════════════════════════════════════════════╝

# ── 기본 설정 ────────────────────────────────────
set -g prefix C-b
bind C-b send-prefix
set -g mouse on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 10000
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── 키바인딩 ─────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 윈도우 이동: Shift+좌우
bind -n S-Left previous-window
bind -n S-Right next-window

# 윈도우 순서 변경: Ctrl+Shift+좌우
bind -n C-S-Left swap-window -t -1\; previous-window
bind -n C-S-Right swap-window -t +1\; next-window

# ── 색상 팔레트 (Light Mono) ─────────────────────
#   bg_main    = #f5f5f5    (상태바 배경)
#   bg_active  = #e8e8e8    (활성 윈도우 탭)
#   fg_dim     = #999999    (비활성 텍스트)
#   fg_mid     = #666666    (보조 텍스트)
#   fg_dark    = #000000    (주요 텍스트 - 순수 검정)
#   accent     = #2563eb    (포인트 블루)

# ── 상태바 (전체) ────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#f5f5f5,fg=#999999"

# ── 상태바 왼쪽: 세션명 ─────────────────────────
set -g status-left-length 30
set -g status-left "#[fg=#ffffff,bg=#2563eb,bold]  #S #[fg=#2563eb,bg=#f5f5f5] "

# ── 상태바 오른쪽: git 브랜치 + 경로 + 시간 ─────
set -g status-right-length 90
set -g status-right "#[fg=#999999]#{b:pane_current_path} #[fg=#2563eb]⎇ #(git -C #{pane_current_path} symbolic-ref --short HEAD 2>/dev/null || echo '—') #[fg=#666666]│ #[fg=#000000]%H:%M #[fg=#999999]%a"

# ── 윈도우 탭 (비활성) ──────────────────────────
setw -g window-status-format "#[fg=#999999]  #I #W  "
setw -g window-status-separator ""

# ── 윈도우 탭 (활성) ────────────────────────────
setw -g window-status-current-format "#[fg=#000000,bg=#e8e8e8,bold]  #I #W  "

# ── 윈도우 활동 알림 ────────────────────────────
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#2563eb,bg=#f5f5f5,none"

# ── 윈도우 자동 이름 ────────────────────────────
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"

# ── 패널 테두리 ─────────────────────────────────
set -g pane-border-style "fg=#d0d0d0"
set -g pane-active-border-style "fg=#2563eb,bold"
set -g pane-border-lines heavy

# 비활성 pane 배경 dim (활성 pane만 또렷하게)
set -g window-style "bg=#ececec"
set -g window-active-style "bg=default"

# 패널 하단에 제목 표시 (입력 위치 근처에 표시되도록)
set -g pane-border-status bottom
set -g pane-border-format "#{?pane_active,#[fg=#2563eb#,bold]▶ #{pane_index}:#{b:pane_current_command} ── ACTIVE ──,#[fg=#999999] #{pane_index}:#{b:pane_current_command}} #[fg=#d0d0d0]─"

# ── 메시지 / 명령줄 ─────────────────────────────
set -g message-style "bg=#e8e8e8,fg=#000000"
set -g message-command-style "bg=#e8e8e8,fg=#2563eb"

# ── 클럭 모드 (Prefix + t) ──────────────────────
setw -g clock-mode-colour "#2563eb"
setw -g clock-mode-style 24

# ── 선택/복사 모드 ──────────────────────────────
setw -g mode-style "bg=#bfdbfe,fg=#000000"

# ── 팝업 메뉴 스타일 ────────────────────────────
set -g popup-border-style "fg=#999999"
set -g popup-border-lines rounded
